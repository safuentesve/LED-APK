name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Instalar SOLO Python 3.11 del sistema, sin setup-python
      - name: Setup Python 3.11
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3.11 python3.11-dev python3.11-distutils
          # Hacer python3.11 el default absoluto
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 10
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 10
          sudo update-alternatives --install /usr/local/bin/python python /usr/bin/python3.11 10
          sudo update-alternatives --install /usr/local/bin/python3 python3 /usr/bin/python3.11 10
          # Verificar
          python --version
          python3 --version
          which python3

      - name: Install system build deps
        run: |
          sudo apt-get install -y \
            build-essential git zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev cmake

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install pip and tools
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
          python3.11 -m pip install --upgrade pip setuptools wheel
          python3.11 -m pip install cython==3.0.1
          python3.11 -m pip install buildozer==1.5.0

      - name: Verify versions
        run: |
          python3.11 --version
          python3.11 -m pip show buildozer | grep Version
          python3.11 -m pip show cython | grep Version

      - name: Cache ~/.buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: bz-${{ runner.os }}-py311-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: bz-${{ runner.os }}-py311-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          PATH: /usr/bin:/usr/local/bin:/usr/lib/jvm/java-17-openjdk-amd64/bin:${{ env.PATH }}
        run: |
          export PATH="/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH"
          # Asegurar que python apunta a 3.11 en todo el proceso
          export PYTHONHOME=""
          python3.11 -m buildozer android debug

      - name: List bin/
        if: always()
        run: ls -lh bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LED-Panel-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
