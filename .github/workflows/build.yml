name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install buildozer and system dependencies
        run: |
          pip install --upgrade pip setuptools virtualenv
          pip install "cython<3.0.0" "buildozer==1.5.0"
          sudo apt update
          sudo apt install -y openjdk-17-jdk build-essential libssl-dev libffi-dev \
            zlib1g-dev autoconf automake libtool ccache clang lld
            
      - name: Clear Buildozer Cache
        run: |
          buildozer android clean
          
      - name: Build APK
        run: |
          yes | buildozer android debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: led-panel-apk
          path: bin/*.apk
