name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 3.11 and system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3.11 \
            python3.11-dev \
            python3.11-venv \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Force Python 3.11 as default
        run: |
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          sudo ln -sf /usr/bin/python3.11 /usr/local/bin/python3
          sudo ln -sf /usr/bin/python3.11 /usr/local/bin/python
          python3 --version
          python --version

      - name: Set JAVA_HOME to Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install pip for Python 3.11
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
          python3.11 -m pip install --upgrade pip setuptools wheel

      - name: Install buildozer and cython
        run: |
          python3.11 -m pip install buildozer==1.5.0
          python3.11 -m pip install cython==0.29.37

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-py311-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-py311-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          python3.11 -m buildozer -v android debug 2>&1

      - name: Find APK
        run: find . -name "*.apk" || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LED-Panel-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
