name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            zip \
            unzip \
            openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          java -version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg

      - name: Build APK with buildozer
        env:
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROIDNDK: ~/.buildozer/android/platform/android-ndk-r25b
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "26"
        run: |
          buildozer -v android debug 2>&1

      - name: List output files
        run: |
          ls -lh bin/ || echo "No bin/ directory found"
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LED-Panel-Controller-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
