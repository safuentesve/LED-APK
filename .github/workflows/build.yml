name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3.11 python3.11-dev python3.11-distutils \
            build-essential git zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev cmake

      - name: Force Python 3.11 as default
        run: |
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 10
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 10
          python3 --version

      - name: Install pip
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11

      - name: Install cython and buildozer
        run: |
          python3.11 -m pip install --upgrade pip setuptools wheel
          python3.11 -m pip install cython==3.0.1
          python3.11 -m pip install buildozer==1.5.0
          # Crear symlinks para que buildozer encuentre cython y buildozer como ejecutables
          PYTHON_BIN=$(python3.11 -m site --user-base)/bin
          SITE_BIN=$(python3.11 -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "Scripts en: $SITE_BIN"
          sudo ln -sf "$SITE_BIN/cython" /usr/local/bin/cython || true
          sudo ln -sf "$SITE_BIN/buildozer" /usr/local/bin/buildozer || true
          # Verificar
          which cython && cython --version
          which buildozer && buildozer version

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Cache ~/.buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: bz-${{ runner.os }}-py311-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: bz-${{ runner.os }}-py311-v4-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export PATH="/usr/lib/jvm/java-17-openjdk-amd64/bin:/usr/local/bin:$PATH"
          buildozer android debug

      - name: List bin/
        if: always()
        run: ls -lh bin/ 2>/dev/null || echo "No bin/ generado"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LED-Panel-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
