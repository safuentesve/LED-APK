name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer_cache
          key: bz-${{ hashFiles('buildozer.spec') }}-v5
          restore-keys: bz-v5-

      - name: Build with buildozer-action (Docker interno)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: .
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LED-Panel-APK
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: warn
          retention-days: 30
